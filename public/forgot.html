<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forgot Password</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Forgot Password</h1>

      <form id="forgotForm">
        <input type="email" id="email" placeholder="Enter Email" required />

        <button type="submit" id="sendOtpBtn">Send OTP</button>
      </form>
    </div>
    <div id="resetSection" style="display: none">
      <input
        type="text"
        id="otp"
        placeholder="Enter OTP"
        maxlength="6"
        required
      />

      <div class="password-wrapper">
        <input
          type="password"
          id="newPassword"
          placeholder="New Password"
          required
        />

        <span id="toggleNewPassword" class="toggle-password">👁</span>
      </div>

      <div class="password-wrapper">
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm Password"
          required
        />

        <span id="toggleConfirmPassword" class="toggle-password">👁</span>
      </div>

      <button id="resetBtn" type="button">Reset Password</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="forgot.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
