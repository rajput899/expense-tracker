<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Expense Tracker</h1>
      <button id="logoutBtn">Logout</button>
      <button id="themeBtn">🌙 Dark Mode</button>
      <button id="exportBtn">📥 Export CSV</button>

      <div class="stats">
        <div class="card stat-card">
          <h3>Total Expense</h3>
          <h2 id="total">₹0</h2>
        </div>

        <div class="card stat-card">
          <h3>Total Transactions</h3>
          <h2 id="count">0</h2>
          <p id="warning"></p>
        </div>

        <div class="card stat-card">
          <h3>Highest Expense</h3>
          <h2 id="highest">₹0</h2>
        </div>
      </div>
      <div class="card">
        <form id="expenseForm">
          <input type="text" id="title" placeholder="Expense Title" required />

          <input type="number" id="amount" placeholder="Amount" required />
           <select id="category" required>
  <option value="">Select Category</option>
  <option value="Food">Food</option>
  <option value="Transport">Transport</option>
  <option value="Shopping">Shopping</option>
  <option value="Bills">Bills</option>
  <option value="Health">Health</option>
  <option value="Entertainment">Entertainment</option>
  <option value="Other">Other</option>
</select>
          

          <button type="submit">Add Expense</button>
        </form>
        <input type="text" id="search" placeholder="Search Expense..." />
        <select id="filter">
  <option value="All">All Categories</option>
  <option value="Food">Food</option>
  <option value="Transport">Transport</option>
  <option value="Shopping">Shopping</option>
  <option value="Bills">Bills</option>
  <option value="Health">Health</option>
  <option value="Entertainment">Entertainment</option>
  <option value="Other">Other</option>
</select>
        </div>

      <div class="card">
        <h2>Monthly Budget</h2>

        <input type="number" id="budgetInput" placeholder="Enter Budget" />

        <button id="setBudget">Set Budget</button>

        <h3>
          Remaining:
          <span id="remainingBudget"> ₹0 </span>
        </h3>

        <div class="progress">
          <div id="progressBar"></div>
        </div>
      </div>
      <div class="card">
        <div class="chart-buttons">
          <button id="pieBtn">Pie Chart</button>

          <button id="barBtn">Bar Chart</button>
        </div>

        <canvas id="expenseChart"></canvas>
      </div>
      <div id="expenseList"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
    <script src="auth.js"></script>

    
  </body>
</html>
